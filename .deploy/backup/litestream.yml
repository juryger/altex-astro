dbs:
  - path: /var/www/altexweb.ru/db/catalog.db
    replica:
      type: s3
      bucket: altexweb-backups-db
      path: catalog
      endpoint: https://s3.regru.cloud
      access-key-id: $LITESTREAM_ACCESS_KEY_ID
      secret-access-key: $LITESTREAM_SECRET_ACCESS_KEY
      region: ap-southeast-6
      sync-interval: 24h
